morefish:
  main:
    already-stopped: "<lang:morefish.main.prefix> <white>The contest is already stopped."
    announcement:
      catch: "<lang:morefish.main.prefix> <yellow><player:head> <player> <white>caught <fish-rarity:color><fish:length:#.##>cm <reset><fish:sprite> <bold><fish-rarity:color><fish-type:display-name>."
      pre-announcement:
        message: "<lang:morefish.main.prefix> <white>If there are <gold><required-players> <white>or more players online in <gold><time-remaining><white>, the next competition will begin!"
        time-remaining: "<hours> <minutes>"
        hour:
          singular: "hour"
          plural: "hours"
        minute:
          singular: "minute"
          plural: "minutes"
      new-1st: "<lang:morefish.main.prefix> <yellow><player> <white>is now 1st!"
    config:
      success: "Loaded config.yml successfully!"
    fish:
      success: "Loaded <rarity-count> rarities and <type-count> types."
      error: "<error>"
    lang:
      success: "Loaded language configuration files."
      error: "<error>"
    contraband-alert: "<red><click:run_command:/mf contraband>[MF] CONTRABAND DETECTED IN YOUR FISH BAG. CLICK THIS MESSAGE TO RETRIEVE IT NOW."
    contest:
      start: "<lang:morefish.main.prefix> <white>The fishing contest has started!"
      timer: "<lang:morefish.main.prefix> <white>This contest will end in <time-remaining>."
      stop: "<lang:morefish.main.prefix> <white>The fishing contest has ended!"
      logs:
        critical-error: "Critical error with competition logs. Please report this bug."
        error: "Error saving <file>"
    fish-bags:
      load-error: "An error occurred while loading fish bags."
      save-error: "An error occurred while saving fish bag for <uuid>."
    fishing-logs:
      error:
        load: "Error loading fishing_logs.yml"
        save: "Error saving fishing_logs.yml"
    item-format:
      display-name: "<fish-rarity:color><fish-type:display-name>"
      lore:
        length: "<gray><fish:length:#.##>cm"
        caught: "<gray>Caught by <player>"
    plugin:
      disabled: "MoreFish has been disabled."
      enabled: "MoreFish has been enabled."
    prefix: "<dark_gray>[<gold>MoreFish<dark_gray>]"
    prize-warning: "<player> isn't online! Contest prizes may not be sent."
    sales-filter:
      rarity: "<fish-rarity:color><fish-shared:display-name>"
      label: "Set Sale Filter(s)"
    scoreboard:
      display-name: "<gold>Top 5 Fishers"
      entry: "<player> <red><fish-record:length:#.##>cm"
    shop:
      title: "Put your fish to sell"
      fish-sold: "<lang:morefish.main.prefix> <white>You sold fish for <green>$<total-price><white>."
      no-fish-to-sell: "<lang:morefish.main.prefix> <white>There's no fish to sell. Please put them into the slots."
      not-enough-money: "<lang:morefish.main.prefix> <white>You do not have enough money for that upgrade!"
      sell-icon-name: "<green>Sell for $<amount>"
      sale-filter-icon-name: "Set Sale Filter(s)"
      upgrade-icon:
        name: "Bag Upgrades"
        lore: "<green><upgrade-level> page(s) for $<upgrade-price>"
    timer-bar-title: "<color:#FF5300><bold>Fishing Contest</bold> <white>[<time-remaining> left]"
    top:
      no-catches: "<lang:morefish.main.prefix> <white>Nobody has caught anything yet."
      player:
        no-catch: "<lang:morefish.main.prefix> <white>You didn't catch any fish."
        record: "<lang:morefish.main.prefix> <white>You're <ordinal>.: <fish-record:length:#.##>cm <fish-record:fish-type:display-name>"
      ranked-record: "<lang:morefish.main.prefix> <yellow><ordinal>.: <dark_gray><fish-record:fisher>, <fish-record:length:#.##>cm <fish-record:fish-type:display-name>"
    type-selector-new-name: "<gradient:#ff5900:#5555ff>Select A Fish To Edit"
